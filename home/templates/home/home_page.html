{% extends "base.html" %}
{% load wagtailimages_tags %}

{% block content %}

<!-- Hero -->
<section class="hero"
    {% if page.imagen_hero %}
    {% image page.imagen_hero fill-1600x600 as img %}
    style="background-image: url('{{ img.url }}');"
    {% endif %}
>
    <div>
        <h1 class="display-3">{{ page.title }}</h1>
        {% if page.subtitulo %}
        <p class="lead">{{ page.subtitulo }}</p>
        {% endif %}
        {% if page.boton_texto %}
        <a href="{{ page.boton_url }}" class="btn btn-primary btn-lg mt-3">
            {{ page.boton_texto }}
        </a>
        {% endif %}
    </div>
</section>

{% endblock %}
